schema_version: run-config-v1
seed: 29
device: auto
output_root: artifacts/runs
task:
  task_id: associative_recall.v1
  profile: qualification
model:
  kind: gru
  hidden_size: 128
  layers: 1
  heads: 4
  feedforward_size: 512
  dropout: 0.0
optimizer:
  learning_rate: 0.0003
  weight_decay: 0.01
  gradient_clip_norm: 1.0
training:
  batch_size: 64
  max_steps: 5000
  eval_interval: 100
  patience: 10
  min_delta: 0.001
  tbptt_steps: 32
  checkpoint_interval: 100
  auxiliary_loss_weight: 0.1
  require_loss_decrease: true
