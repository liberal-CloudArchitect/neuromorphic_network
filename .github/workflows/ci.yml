name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Create brain Conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: brain
          auto-update-conda: true
          channel-priority: strict
          channels: defaults
          conda-solver: libmamba
          environment-file: environment.yml
          miniconda-version: latest

      - name: Install official CPU PyTorch and project
        run: |
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.12.1
          python -m pip install --editable '.[dev]'

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check
        run: mypy src scripts tests

      - name: Test
        run: pytest

      - name: CPU smoke test
        run: python scripts/check_environment.py --require cpu
